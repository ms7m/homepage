name = "cratedigger"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

[[kv_namespaces]]
binding = "ALBUMS"
id = "991e0d00dbd647e7a413414180e5ce5f"

[[d1_databases]]
binding = "DB"
database_name = "cratedigger"
database_id = "cfb24d67-bf97-4633-904f-8cc775838706"

[[r2_buckets]]
binding = "ALBUM_ART"
bucket_name = "mikka-album-art"

[vars]
PUBLIC_API_URL = "https://api.mikka.link"

# Secrets: set via `wrangler secret put`
# WEBHOOK_SECRET
# SPOTIFY_CLIENT_ID
# SPOTIFY_CLIENT_SECRET
# R2_PUBLIC_URL  (e.g. https://art.mikka.link)
